model:
  default: Qwen3.6-27B-MTP-Q6_K
  provider: custom:vesta-local-llama
  base_url: http://192.168.1.117:1234/v1
  api_key: no-key-required
  api_mode: chat_completions
  context_length: 196608
  max_tokens: 2048

custom_providers:
  - name: vesta-local-llama
    base_url: http://192.168.1.117:1234/v1
    api_key: no-key-required
    api_mode: chat_completions
    model: Qwen3.6-27B-MTP-Q6_K
    models:
      Qwen3.6-27B-MTP-Q6_K:
        context_length: 196608
      Qwen3.6-35B-A3B-MTP-UD-Q8_K_XL:
        context_length: 65536

toolsets:
  - hermes-cli

agent:
  max_turns: 40
  tool_use_enforcement: true
  api_max_retries: 1

terminal:
  backend: local
  cwd: .
  timeout: 180

compression:
  enabled: true
  threshold: 0.75
  target_ratio: 0.20
  protect_last_n: 20
  protect_first_n: 3

delegation:
  model: Qwen3.6-35B-A3B-MTP-UD-Q8_K_XL
  provider: custom:vesta-local-llama
  base_url: http://192.168.1.117:1234/v1
  api_key: no-key-required
  api_mode: chat_completions
  max_iterations: 30
  child_timeout_seconds: 600
  max_concurrent_children: 2
  max_spawn_depth: 1

vesta:
  retrieval:
    mode: disciplined
    broad_read_line_threshold: 200
    broad_read_byte_threshold: 20000
    broad_read_token_threshold: 12000
  whole_document:
    token_threshold: 100000
    max_chunk_tokens: 20000
  raw_retention:
    retain_by_default: true
    purge_preserves_manifest: true
